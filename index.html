<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PT Dashboard Pro v4</title>
<style>
:root{
  --bg:#101113; --panel:#181b20; --panel2:#222730; --line:#2e3540; --text:#f5f7fa; --muted:#aeb6c2;
  --orange:#ff7a00; --orange2:#ffa14d; --white:#ffffff; --green:#1fa85a; --lime:#7bc96f; --amber:#f2b318; --orangeSoft:#ff9f43; --red:#d64545; --red2:#a81e2f;
  --radius:18px; --shadow:0 12px 26px rgba(0,0,0,.26);
}
*{box-sizing:border-box} html,body{margin:0;padding:0;background:linear-gradient(180deg,#0e1012 0%,#121418 100%);color:var(--text);font-family:Inter,Arial,sans-serif}
header{position:sticky;top:0;z-index:50;background:rgba(12,14,16,.94);backdrop-filter:blur(10px);border-bottom:1px solid #22272f}
.top{max-width:1600px;margin:0 auto;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:12px;font-weight:900}.brandLogo{height:48px;width:auto;display:block;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35));border-radius:10px}.brandTitle{font-size:18px;font-weight:900}
.brand small{display:block;color:var(--muted);font-size:12px;font-weight:700;margin-top:2px}
.btn{border:none;cursor:pointer;border-radius:12px;padding:10px 14px;font-weight:900;background:var(--orange);color:#111;box-shadow:var(--shadow)}
.btn.secondary{background:#262c34;color:var(--text);border:1px solid #36404c;box-shadow:none}
.btn.mini{padding:7px 10px;font-size:12px;border-radius:10px}
.btn.ghost{background:transparent;color:var(--text);border:1px solid #39424f;box-shadow:none}
.shell{max-width:1600px;margin:0 auto;padding:18px 16px 30px}
.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.tab{padding:12px 16px;border-radius:14px;background:#21262e;border:1px solid #323a45;color:#fff;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;border-color:transparent}
.view{display:none}.view.active{display:block}
.grid{display:grid;gap:16px}.cols-2{grid-template-columns:1.15fr .85fr}.cols-3{grid-template-columns:repeat(3,1fr)}
.card{background:linear-gradient(180deg,#191d22 0%,#15181d 100%);border:1px solid #2d333d;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.card h2,.card h3{margin:0 0 10px}.sub{font-size:13px;color:var(--muted)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.metric{background:#fff;border:1px solid #e4e7ec;border-radius:16px;padding:14px;color:#111}.metric .k{font-size:12px;font-weight:800;color:#606976}.metric .v{font-size:28px;font-weight:900;margin-top:6px}
.infoGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.info{background:#fff;color:#111;border-radius:16px;padding:14px;border:1px solid #e5e8ed}.info .k{font-size:12px;color:#69717d;font-weight:800}.info .v{margin-top:6px;font-size:18px;font-weight:900}
.fieldGrid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.span12{grid-column:span 12}.span6{grid-column:span 6}.span4{grid-column:span 4}.span3{grid-column:span 3}
.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;font-weight:800;color:#d5dbe3}.field input,.field select,.field textarea{width:100%;padding:11px 12px;border-radius:12px;border:1px solid #d7dce4;background:#fff;color:#111;font-size:14px}.field textarea{min-height:88px;resize:vertical}
.rowHead{display:flex;justify-content:space-between;gap:12px;align-items:flex-end;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:8px;background:#242a32;border:1px solid #343d49;color:#fff;padding:8px 10px;border-radius:999px;font-size:12px;font-weight:900}
.daysStrip{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.dayChip{padding:10px 14px;border-radius:999px;background:#272d35;border:1px solid #37404c;color:#fff;font-weight:900;cursor:pointer}.dayChip.active{background:linear-gradient(135deg,var(--orange),var(--orange2));color:#111;border-color:transparent}
.tableWrap{overflow:auto;border-radius:16px;border:1px solid #dfe4ea;background:#fff}.tableWrap.dark{background:#14171b;border-color:#2e3540}
table{width:100%;border-collapse:collapse;min-width:1100px}th,td{border:1px solid #e0e4ea;padding:8px;vertical-align:top}th{background:#fff0df;color:#111;text-align:left;font-size:12px}td{background:#fff;color:#111}.dark th{background:#262c34;color:#ffc48d;border-color:#323946}.dark td{background:#171a1f;color:#fff;border-color:#2f3641}
.weekHead{background:#ffe5c6 !important;color:#111 !important;text-align:center;font-weight:900}.smallInput,.smallText,.smallSelect{width:100%;padding:8px;border-radius:9px;border:1px solid #d7dce4;background:#fff;color:#111;font-size:12px}.smallText{min-width:120px}
.avgRow td{background:#fff7ed !important;font-weight:900}.avgLabel{color:#7a3e00}
.legend{display:flex;gap:10px;flex-wrap:wrap}.legend .badge{background:#fff;color:#111;border-color:#e2e6ec}
.canvasCard canvas{display:block;width:100%;min-height:310px;height:310px;background:#fff;border-radius:16px;border:1px solid #e1e5ea}
.rightTools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.editorSection{margin-top:14px;padding-top:14px;border-top:1px solid #2e3540}
.editorRow{display:grid;grid-template-columns:110px 130px 1.2fr 90px 90px 110px 1fr auto;gap:8px;align-items:start;padding:10px;border-radius:14px;background:#fff;border:1px solid #e2e6ec;color:#111;margin-bottom:8px}
.editorRow input,.editorRow select,.editorRow textarea{width:100%;padding:8px;border-radius:9px;border:1px solid #d7dde4;background:#fff;color:#111;font-size:12px}.editorRow textarea{min-height:42px}
.stack{display:flex;flex-direction:column;gap:6px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}.modal.open{display:flex}.modalCard{width:min(1100px,100%);max-height:92vh;overflow:auto;background:#171b20;border:1px solid #303742;border-radius:22px;padding:18px;box-shadow:var(--shadow)}
.status-5{background:#dff7e8 !important}.status-4{background:#edf8d9 !important}.status-3{background:#fff3c9 !important}.status-2{background:#ffe2c0 !important}.status-1{background:#ffd6d6 !important}.stress-1,.stress-2{background:#dff7e8 !important}.stress-3,.stress-4{background:#edf8d9 !important}.stress-5,.stress-6{background:#fff3c9 !important}.stress-7{background:#ffd9b5 !important}.stress-8{background:#ffd6d6 !important}.weightBig{font-size:18px;font-weight:900;min-width:76px}.sensBox{min-width:180px;min-height:56px;white-space:normal;line-height:1.2}.controlBtns{display:flex;gap:8px;flex-wrap:wrap}.controlBtns .btn{min-width:130px;border-radius:12px;font-weight:900;box-shadow:0 4px 10px rgba(0,0,0,.12)}.seriesList{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:14px}.seriesItem{background:#fff;border:1px solid #e4e7ec;border-radius:14px;padding:12px;color:#111}.seriesItem .n{font-size:24px;font-weight:900;margin-top:4px}.selectorRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.selectorRow label{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e2e6ec;border-radius:999px;padding:8px 12px;color:#111;font-weight:800}
.note{font-size:12px;color:#aeb6c2}
.tableWrap{overflow:auto;border-radius:18px;border:1px solid #dfe4ea;background:#fff;scroll-behavior:smooth}
.tableWrap.schedaWrap{position:relative;max-height:72vh;border-radius:16px}
.schedaGrid{min-width:1680px;border-collapse:separate;border-spacing:0;table-layout:fixed}
.schedaGrid col.col-distretto{width:140px}
.schedaGrid col.col-esercizio{width:230px}
.schedaGrid col.col-note{width:160px}
.schedaGrid col.col-rec{width:90px}
.schedaGrid col.col-serie{width:84px}
.schedaGrid col.col-peso{width:86px}
.schedaGrid col.col-sensazioni{width:150px}
.schedaGrid th,.schedaGrid td{overflow:hidden;position:relative;vertical-align:top}
.schedaGrid td{padding:6px 8px}.schedaGrid th{padding:8px 8px}.schedaGrid .stickyCol2 strong{display:block;font-size:13px;line-height:1.2}.schedaGrid .stickyCol3,.schedaGrid .stickyCol4{font-size:13px;line-height:1.2}.schedaGrid .stickyCol3{color:#f3f4f6}.schedaGrid .stickyCol4{text-align:center;font-weight:800}
.schedaGrid td,.schedaGrid th{white-space:normal;word-break:break-word}
.schedaGrid thead th{position:sticky;top:0;z-index:8}
.schedaGrid .weekSerie,.schedaGrid .weekPeso{white-space:nowrap;text-align:center;vertical-align:middle}
.schedaGrid .weekSens{white-space:normal;vertical-align:middle}
.stickyCol{position:sticky;left:0;z-index:7;background:inherit;min-width:140px;max-width:140px}
.stickyCol2{position:sticky;left:140px;z-index:7;background:inherit;min-width:230px;max-width:230px}
.stickyCol3{position:sticky;left:370px;z-index:7;background:inherit;min-width:160px;max-width:160px}
.stickyCol4{position:sticky;left:530px;z-index:7;background:inherit;min-width:90px;max-width:90px}
.dark .stickyCol,.dark .stickyCol2,.dark .stickyCol3,.dark .stickyCol4{background:#171a1f}
.editorRow{grid-template-columns:56px 120px minmax(260px,1.25fr) minmax(210px,.95fr) 120px minmax(520px,1.9fr);gap:10px;align-items:start;padding:12px 12px 10px;border-radius:18px;background:#fff;border:1px solid #e2e6ec;color:#111;margin-bottom:10px;box-shadow:0 10px 22px rgba(15,23,42,.08)}
.editorProgGrid{display:grid;grid-template-columns:repeat(3,minmax(118px,1fr));gap:8px}
.progBox{background:linear-gradient(180deg,#fff7ed 0%,#ffffff 100%);border:1px solid #fed7aa;border-radius:14px;padding:8px}
.progBox .wk{font-size:11px;font-weight:900;color:#9a3412;margin-bottom:6px}
.progFields{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center}
.progFields span{font-weight:900;color:#9a3412;text-align:center}
.progPreview{margin-top:6px;font-size:11px;font-weight:800;color:#7c2d12;text-align:center}
.ctrlPanelBtn,.ctrlTiny,.coachAction{padding:7px 10px;border-radius:999px;font-size:11px;font-weight:900;background:linear-gradient(135deg,#ff7a00,#ff9d3f) !important;color:#111 !important;border:1px solid #a84d00;box-shadow:none}
.coachAction.darkMini{background:#15181d !important;color:#ffb36d !important;border:1px solid #3d2a18}
.miniActionRow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.kpiRibbon{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:14px}
.kpiPill{padding:12px 14px;border-radius:16px;background:linear-gradient(180deg,#fff 0%,#fff7ed 100%);color:#111;border:1px solid #fde68a;box-shadow:0 8px 20px rgba(0,0,0,.05)}
.kpiPill .t{font-size:12px;font-weight:800;color:#7c2d12}.kpiPill .n{font-size:24px;font-weight:900;margin-top:4px}
.summarySmooth .card,.summarySmooth .metric,.summarySmooth .seriesItem,.summarySmooth .info{transition:transform .18s ease, box-shadow .18s ease}
.summarySmooth .card:hover,.summarySmooth .metric:hover,.summarySmooth .seriesItem:hover,.summarySmooth .info:hover{transform:translateY(-2px)}
.progressLabel{display:inline-flex;align-items:center;justify-content:center;min-width:74px;padding:8px 10px;border-radius:12px;background:#fff7ed;border:1px solid #fed7aa;font-weight:900;color:#9a3412}.pasteColor{background:linear-gradient(135deg,#7c3aed,#a855f7)!important;color:#fff!important;border:none!important}
.bigWeightInput{font-size:15px;font-weight:900;padding:8px 8px;border-radius:12px;text-align:center}
.sensTextArea{min-width:140px;min-height:74px;line-height:1.2;border-radius:12px;resize:vertical}
.coachFixed{box-shadow:10px 0 14px rgba(0,0,0,.18);z-index:20;isolation:isolate}
.stickyCol,.stickyCol2,.stickyCol3,.stickyCol4{background:#171a1f !important;background-clip:padding-box}
.schedaGrid th.stickyCol,.schedaGrid th.stickyCol2,.schedaGrid th.stickyCol3,.schedaGrid th.stickyCol4{z-index:24}
.schedaGrid td.stickyCol,.schedaGrid td.stickyCol2,.schedaGrid td.stickyCol3,.schedaGrid td.stickyCol4{z-index:20}
.stickyCol::after,.stickyCol2::after,.stickyCol3::after{content:'';position:absolute;top:-1px;right:-20px;width:20px;height:calc(100% + 2px);background:linear-gradient(90deg,#171a1f 0%, #171a1f 76%, rgba(23,26,31,0) 100%);pointer-events:none}
.stickyCol4::after{content:'';position:absolute;top:-1px;right:-30px;width:30px;height:calc(100% + 2px);background:linear-gradient(90deg,#171a1f 0%, #171a1f 84%, rgba(23,26,31,0) 100%);pointer-events:none}
.editorSection{padding:16px 0;border-top:1px solid #2e3540}
.editorDayCard{background:linear-gradient(180deg,#14181d 0%,#111418 100%);border:1px solid #2d3642;border-radius:18px;padding:14px}
.editorDayToolbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.editorDayActions{display:flex;gap:8px;flex-wrap:wrap}
.editorRow .fieldLite{display:flex;flex-direction:column;gap:6px}
.editorRow .fieldLite label{font-size:11px;font-weight:900;color:#475569;text-transform:uppercase;letter-spacing:.02em}
.editorRow .fieldLite input,.editorRow .fieldLite select,.editorRow .fieldLite textarea{width:100%;padding:8px;border-radius:10px;border:1px solid #d7dde4;background:#fff;color:#111;font-size:12px}
.editorRow .fieldLite textarea{min-height:86px;resize:vertical}
.exerciseField{min-width:0}
.avgRow td{background:#fff8ef !important;font-weight:900;color:#7c2d12}.avgRow td.avgMute{background:#fffdf9 !important;color:#bea07f !important;font-weight:700}

.schedaTwoPane{display:grid;grid-template-columns:620px minmax(0,1fr);border:1px solid #2f3641;border-radius:16px;overflow:hidden;background:#14171b}
.fixedPane{border-right:1px solid #2f3641;background:#171a1f;overflow:hidden}
.scrollPane{overflow:auto;background:#14171b}
.fixedPane table,.scrollPane table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:100%}
.fixedPane th,.fixedPane td,.scrollPane th,.scrollPane td{border:1px solid #2f3641;padding:8px;color:#fff;background:#171a1f;vertical-align:top}
.fixedPane th,.scrollPane th{background:#262c34;color:#ffc48d;font-size:12px}
.scrollPane .weekTop th{background:#fff0df;color:#111;text-align:center;font-weight:900}
.fixedPane col.col-distretto{width:120px}.fixedPane col.col-esercizio{width:190px}.fixedPane col.col-note{width:190px}.fixedPane col.col-rec{width:120px}
.scrollPane col.col-serie{width:90px}.scrollPane col.col-peso{width:90px}.scrollPane col.col-sensazioni{width:170px}
.fixedCell,.scrollCell{height:100px}
.fixedPane td{word-break:break-word}
.fixedPane .exerciseName{font-weight:900}
.scrollPane .weekSerie,.scrollPane .weekPeso{text-align:center;vertical-align:middle}
.scrollPane .weekSens{vertical-align:middle}
.scrollPane .smallInput,.scrollPane .smallText{background:#fff;color:#111}
.scrollPane .progressLabel{display:inline-flex;justify-content:center;align-items:center;min-width:54px;padding:8px 12px;border-radius:14px;background:#fff7ed;color:#b45309;border:1px solid #fdba74;font-weight:900}
.scrollPane .bigWeightInput{width:100%;text-align:center}
.scrollPane .sensTextArea{width:100%;min-height:72px}
@media (max-width:1200px){.schedaTwoPane{grid-template-columns:1fr}.fixedPane{border-right:none;border-bottom:1px solid #2f3641}}
@media (max-width:1280px){.editorRow{grid-template-columns:56px 120px 1fr 1fr 120px}.editorRow .fieldLite.progressions{grid-column:1/-1}.schedaGrid{min-width:1650px}}
@media (max-width:1100px){.cols-2,.cols-3{grid-template-columns:1fr}.span6,.span4,.span3{grid-column:span 12}.editorRow{grid-template-columns:1fr}.tableWrap.schedaWrap{max-height:none}.stickyCol,.stickyCol2,.stickyCol3,.stickyCol4{position:static;max-width:none}}
</style>
</head>

let clipboardExercise=null;
let macroClipboard=null;
let modalScrollTop=0;
let state={
  profile:{nome:'',cognome:'',periodo:'',startDate:'',weeks:6,trainingDays:4,eta:'',altezza:'',pesoIniziale:'',obiettivo:'',coachNote:''},
  exercises:[],
  diary:{},
  ui:{selectedDay:'Giorno 1',selectedMetrics:['peso','kcal','passi','sonno'],selectedDistrettoGraph:'',selectedExerciseIds:[]}
};
function uid(){return Math.random().toString(36).slice(2,10)}
function parseTargetString(target){
  const m=String(target||'').trim().match(/(\d+)\s*[xX]\s*(\d+)/);
  return m?{sets:m[1],reps:m[2]}:{sets:'',reps:''};
}
function buildTarget(sets,reps){
  if(sets===''&&reps==='') return '';
  if(sets===''||reps==='') return '';
  return `${sets}x${reps}`;
}
function normalizeWeekPlan(wp){
  const next={...(wp||{})};
  const parsed=parseTargetString(next.target);
  if((next.sets===''||typeof next.sets==='undefined') && parsed.sets!=='') next.sets=parsed.sets;
  if((next.reps===''||typeof next.reps==='undefined') && parsed.reps!=='') next.reps=parsed.reps;
  if(typeof next.sets==='undefined') next.sets='';
  if(typeof next.reps==='undefined') next.reps='';
  next.target=buildTarget(next.sets,next.reps);
  if(typeof next.peso==='undefined') next.peso='';
  if(typeof next.sensazioni==='undefined') next.sensazioni='';
  return next;
}
function daysList(){return Array.from({length:Number(state.profile.trainingDays)||4},(_,i)=>`Giorno ${i+1}`)}
function weeks(){return Array.from({length:Number(state.profile.weeks)||6},(_,i)=>i+1)}
function defaultWeekPlans(){return weeks().map(()=>normalizeWeekPlan({sets:'',reps:'',peso:'',sensazioni:'',target:''}))}
function ensure(){
  if(!state.profile) state.profile={nome:'',cognome:'',periodo:'',startDate:'',weeks:6,trainingDays:4,eta:'',altezza:'',pesoIniziale:'',obiettivo:'',coachNote:''};
  if(!state.exercises) state.exercises=[];
  if(!state.diary) state.diary={};
  if(!state.ui) state.ui={selectedDay:'Giorno 1',selectedMetrics:['peso','kcal','passi','sonno'],selectedDistrettoGraph:'',selectedExerciseIds:[]};
  if(!state.ui.selectedMetrics) state.ui.selectedMetrics=['peso','kcal','passi','sonno'];
  if(!state.ui.selectedExerciseIds) state.ui.selectedExerciseIds=[];
  if(typeof state.ui.selectedDistrettoGraph==='undefined') state.ui.selectedDistrettoGraph='';
  if(!daysList().includes(state.ui.selectedDay)) state.ui.selectedDay=daysList()[0];
  state.exercises.forEach(ex=>{
    ex.weekPlans=ex.weekPlans||[];
    while(ex.weekPlans.length<weeks().length) ex.weekPlans.push(normalizeWeekPlan({}));
    ex.weekPlans=ex.weekPlans.slice(0,weeks().length).map(normalizeWeekPlan);
  });
}
function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}
function saveState(alertIt=true){persist(); renderAll(); if(alertIt) alert('Salvato')}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY) || localStorage.getItem('pt_dashboard_pro_v3') || localStorage.getItem('pt_dashboard_pro_v2');
    if(raw) state=JSON.parse(raw)
  }catch(e){}
  ensure(); renderAll()
}
function switchView(view,btn){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+view).classList.add('active'); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); if(view==='riepilogo') setTimeout(()=>renderRiepilogo(true),30); if(view==='scheda') setTimeout(()=>renderScheda(),10); if(view==='diario') setTimeout(()=>renderDiario(),10);}
function openModal(id, html){const m=document.getElementById(id); m.innerHTML=`<div class="modalCard">${html}</div>`; m.classList.add('open'); const card=m.querySelector('.modalCard'); if(card) setTimeout(()=>{card.scrollTop=modalScrollTop||0},0)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function num(v){const n=parseFloat(String(v).replace(',','.')); return Number.isFinite(n)?n:NaN}
function avg(arr){const vals=arr.filter(v=>!isNaN(v)); if(!vals.length) return '-'; return (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1)}
function sleepQualityValue(v){return num(v)}
function toggleMetric(metric){const set=new Set(state.ui.selectedMetrics||[]); if(set.has(metric)) set.delete(metric); else set.add(metric); state.ui.selectedMetrics=[...set]; persist(); renderSummaryCharts()}
function metricChecked(metric){return (state.ui.selectedMetrics||[]).includes(metric) ? 'checked' : ''}
function diaryClass(field,val){ if(!val) return ''; if(field==='stress') return 'stress-'+val; return 'status-'+val; }
function setDistrettoGraph(v){ state.ui.selectedDistrettoGraph=v; persist(); renderSummaryCharts(); }
function iso(d){if(typeof d==='string') return d; return d.toISOString().slice(0,10)}
function formatDateIT(s){const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'})}
function weekdayIT(d){return d.toLocaleDateString('it-IT',{weekday:'long'}).replace(/^./,c=>c.toUpperCase())}
function updateProfile(key,val){state.profile[key]=['weeks','trainingDays'].includes(key)?Number(val||0):val; ensure(); renderAll(false)}

function buildDiaryWeeks(){
  const start=state.profile.startDate?new Date(state.profile.startDate+'T00:00:00'):new Date(); const out=[];
  for(let w=0;w<weeks().length;w++){
    const days=[]; for(let d=0;d<7;d++){ const cur=new Date(start); cur.setDate(start.getDate()+w*7+d); const key=iso(cur); state.diary[key]=state.diary[key]||{c:'',p:'',g:'',kcal:'',peso:'',sensazioni:'',specchio:'',sonnoOre:'',sonnoMin:'',sonnoQual:'',allenamento:'',passiK:'',passiH:'',stress:'',appetito:''}; days.push({date:cur,key}); }
    out.push({label:`Settimana ${w+1}`,days});
  }
  return out;
}
function diarySelect(options,val,key,field){return `<select class="smallSelect ${diaryClass(field,val)}" onchange="updateDiary('${key}','${field}',this.value)">${[''].concat(options.map(x=>x.v)).map(v=>`<option value="${v}" ${String(v)===String(val)?'selected':''}>${!v?'-':options.find(o=>String(o.v)===String(v)).l}</option>`).join('')}</select>`}
function updateDiary(k,f,v){state.diary[k]=state.diary[k]||{}; state.diary[k][f]=v; persist()}
function sleepValue(r){const h=num(r.sonnoOre), m=num(r.sonnoMin); if(isNaN(h)) return NaN; return h + ((isNaN(m)?0:m)/60);}
function stepsValue(r){const k=num(r.passiK), h=num(r.passiH); if(isNaN(k)) return NaN; return k*1000 + (isNaN(h)?0:h*100);}
function weekAverages(week){const rows=week.days.map(d=>state.diary[d.key]); return {c:avg(rows.map(r=>num(r.c))),p:avg(rows.map(r=>num(r.p))),g:avg(rows.map(r=>num(r.g))),kcal:avg(rows.map(r=>num(r.kcal))),peso:avg(rows.map(r=>num(r.peso))),sonno:avg(rows.map(r=>sleepValue(r))),passi:avg(rows.map(r=>stepsValue(r)))} }
function renderDiario(){
  const weeksData=buildDiaryWeeks();
  document.getElementById('view-diario').innerHTML=`<div class="card"><div class="rowHead"><div><h2>Diario</h2><div class="sub">Struttura a settimane, tipo foglio. C-P-G, Kcal, Peso, Sonno e Passi con medie ben visibili sotto ogni settimana.</div></div><div class="badge">${state.profile.startDate?'Inizio '+formatDateIT(state.profile.startDate):'Imposta data nel setup'}</div></div><div style="display:grid;gap:18px;margin-top:14px">${weeksData.map(w=>renderWeekTable(w)).join('')}</div></div>`;
}

function volumeByDistretto(){const out={}; state.exercises.forEach(ex=>{out[ex.distretto]=(out[ex.distretto]||0)+seriesForExerciseWeek(ex,0)}); return out}
function weeklyVolumeByDistretto(){ const out={}; state.exercises.forEach(ex=>{ if(!out[ex.distretto]) out[ex.distretto]=weeks().map(()=>0); weeks().forEach((w,idx)=>{ out[ex.distretto][idx]+=seriesForExerciseWeek(ex,idx); }); }); return out }
function seriesForExerciseWeek(ex,idx){ const fromTarget=seriesFromTarget(ex.weekPlans?.[idx]?.target||''); return fromTarget || 0; }
function seriesFromTarget(t){const m=String(t).match(/(\d+)\s*[xX]/i); return m?Number(m[1]):0}

function buildSummaryData(){
  const entries=Object.entries(state.diary).filter(([k])=>/^\d{4}-\d{2}-\d{2}$/.test(k)).sort((a,b)=>a[0].localeCompare(b[0]));
  const pesoSeries=entries.map(([k,v])=>({label:formatDateIT(k),value:num(v.peso)})).filter(x=>!isNaN(x.value));
  const kcalSeries=entries.map(([k,v])=>({label:formatDateIT(k),value:num(v.kcal)})).filter(x=>!isNaN(x.value));
  const passiSeries=entries.map(([k,v])=>({label:formatDateIT(k),value:stepsValue(v)})).filter(x=>!isNaN(x.value));
  const sonnoSeries=entries.map(([k,v])=>({label:formatDateIT(k),value:sleepValue(v)})).filter(x=>!isNaN(x.value));
  const metricMap={peso:{name:'Peso',data:pesoSeries},kcal:{name:'Kcal',data:kcalSeries},passi:{name:'Passi',data:passiSeries},sonno:{name:'Sonno',data:sonnoSeries}};
  const dist=weeklyVolumeByDistretto(); const distNames=Object.keys(dist); const selectedDist=state.ui.selectedDistrettoGraph || distNames[0] || ''; const distSeries=selectedDist?dist[selectedDist].map((v,i)=>({label:'Sett '+(i+1),value:v})):[];
  return {metricMap, dist, distNames, selectedDist, distSeries};
}
function renderSummaryCharts(){
  const {metricMap, distSeries}=buildSummaryData();
  const selected=(state.ui.selectedMetrics||['peso','kcal','passi','sonno']).filter(k=>metricMap[k]);
  if(document.getElementById('chartProgram')) drawMultiLineChart('chartProgram', selected.map(k=>metricMap[k]));
  if(document.getElementById('chartDistrettoWeek')) drawBarChart('chartDistrettoWeek', Object.fromEntries(distSeries.map(x=>[x.label,x.value])));
}

function selectDay(day){state.ui.selectedDay=day; renderScheda()}
function getDayExercises(day){
  return state.exercises
    .filter(e=>e.day===day)
    .sort((a,b)=>getExerciseSortValue(a)-getExerciseSortValue(b));
}
function getExerciseSortValue(ex){
  const order = Number(ex.ordine||0);
  return Number.isFinite(order) && order>0 ? order : 9999;
}
function syncDayOrder(day){
  getDayExercises(day).forEach((ex,idx)=>{ ex.ordine=String(idx+1); });
}

  const rightCols = `<colgroup>${weeks().map(()=>`<col class="col-serie"><col class="col-peso"><col class="col-sensazioni">`).join('')}</colgroup>`;
  const leftHead = `<thead><tr><th>Distretto</th><th>Esercizio</th><th>Note coach</th><th>Recupero</th></tr></thead>`;
  const rightHead = `<thead><tr class="weekTop">${weeks().map(w=>`<th colspan="3">Sett ${w}</th>`).join('')}</tr><tr>${weeks().map(()=>`<th>Serie</th><th>Peso</th><th>Sensazioni</th>`).join('')}</tr></thead>`;
  if(!rows.length){
    return `<div class="schedaTwoPane"><div class="fixedPane"><table>${leftCols}${leftHead}<tbody><tr><td colspan="4" class="fixedCell">Nessun esercizio inserito. Usa “Pannello coach”.</td></tr></tbody></table></div><div class="scrollPane"><table>${rightCols}${rightHead}<tbody><tr><td colspan="${totalCols}" class="scrollCell">Qui compariranno settimane, peso e sensazioni.</td></tr></tbody></table></div></div>`;
  }
  const leftBody = rows.map(ex=>`<tr data-row-id="${ex.id}"><td class="fixedCell">${escapeHtml(ex.distretto||'')}</td><td class="fixedCell exerciseName">${escapeHtml(ex.name||'')}</td><td class="fixedCell">${escapeHtml(ex.note||'-')}</td><td class="fixedCell">${escapeHtml(ex.rec||'')}</td></tr>`).join('');
  const rightBody = rows.map(ex=>`<tr data-row-id="${ex.id}">${(ex.weekPlans||[]).map((wp,i)=>`<td class="scrollCell weekSerie"><span class="progressLabel">${escapeHtml(buildTarget(wp.sets,wp.reps)||'-')}</span></td><td class="scrollCell weekPeso"><input class="smallInput bigWeightInput" placeholder="kg" value="${escapeHtml(wp.peso||'')}" oninput="updateWeek('${ex.id}',${i},'peso',this.value)"></td><td class="scrollCell weekSens"><textarea class="smallText sensTextArea" placeholder="Sensazioni atleta" oninput="updateWeek('${ex.id}',${i},'sensazioni',this.value)">${escapeHtml(wp.sensazioni||'')}</textarea></td>`).join('')}</tr>`).join('');
  setTimeout(syncSchedaLayout,0);
  return `<div class="schedaTwoPane"><div class="fixedPane" id="schedaFixedPane"><table>${leftCols}${leftHead}<tbody>${leftBody}</tbody></table></div><div class="scrollPane" id="schedaScrollPane" onscroll="syncSchedaScroll(this)"><table>${rightCols}${rightHead}<tbody>${rightBody}</tbody></table></div></div>`;
}
function syncSchedaScroll(el){
  const fixed=document.getElementById('schedaFixedPane');
  if(fixed) fixed.scrollTop=el.scrollTop;
}
function syncSchedaLayout(){
  const fixedRows=[...document.querySelectorAll('#schedaFixedPane tbody tr')];
  const scrollRows=[...document.querySelectorAll('#schedaScrollPane tbody tr')];
  if(!fixedRows.length || fixedRows.length!==scrollRows.length) return;
  fixedRows.forEach((row,i)=>{
    row.style.height='auto';
    scrollRows[i].style.height='auto';
    const h=Math.max(row.getBoundingClientRect().height, scrollRows[i].getBoundingClientRect().height, 100);
    row.style.height=h+'px';
    scrollRows[i].style.height=h+'px';
  });
}
function requestCoachAccess(){
  const pass=window.prompt('Inserisci la password coach');
  if(pass===null) return;
  if(pass!=='Vinniefalco'){ alert('Password errata'); return; }
  openSchedaEditor();
}
function openSchedaEditor(){
  openModal('schedaModal',`
    <div class="rowHead">
      <div><h2>Modifica scheda</h2><div class="sub">Aggiungi esercizi, copia blocchi o sole progressioni, incolla in alto nel giorno e riordina con i pulsanti.</div></div>
      <button class="btn mini secondary" onclick="closeModal('schedaModal')">Chiudi</button>
    </div>
    <div style="margin-top:14px">${daysList().map(day=>renderEditorDay(day)).join('')}</div>
    <div style="margin-top:14px"><button class="btn" onclick="saveState();closeModal('schedaModal')">Salva scheda</button></div>
  `);
}
function renderEditorDay(day){
  const items=getDayExercises(day);
  return `<div class="editorSection">
    <div class="editorDayCard">
      <div class="editorDayToolbar">
        <div><h3 style="margin:0">${day}</h3><div class="sub">Inserimento rapido del giorno.</div></div>
        <div class="editorDayActions">
          <button class="btn mini coachAction" onclick="rememberModalScroll();addExercise('${day.replace(/'/g,"\\'")}')">Aggiungi esercizio</button>
          <button class="btn mini coachAction darkMini" onclick="copySelected('${day.replace(/'/g,"\\'")}')">Copia selezionati</button>
          <button class="btn mini coachAction" onclick="rememberModalScroll();pasteExerciseToTop('${day.replace(/'/g,"\\'")}')">Incolla in alto</button>
        </div>
      </div>
      <div style="margin-top:10px">${items.length ? items.map(e=>renderEditorRow(e)).join('') : '<div class="sub">Nessun esercizio.</div>'}</div>
    </div>
  </div>`;
}
function renderEditorRow(ex){
  return `<div class="editorRow">
    <div class="fieldLite"><label>Sel.</label><input type="checkbox" ${isExerciseSelected(ex.id)?'checked':''} onchange="toggleExerciseSelect('${ex.id}',this.checked)"></div>
    <div class="fieldLite"><label>Distretto</label><select onchange="updateExercise('${ex.id}','distretto',this.value)">${DISTRETTI.map(d=>`<option ${d===ex.distretto?'selected':''}>${d}</option>`).join('')}</select></div>
    <div class="fieldLite exerciseField"><label>Esercizio</label><input value="${escapeHtml(ex.name||'')}" oninput="updateExercise('${ex.id}','name',this.value)">
      <div class="miniActionRow">
        <button class="btn mini coachAction" onclick="copyExercise('${ex.id}')">Copia blocco</button>
        <button class="btn mini coachAction" onclick="copyProgressions('${ex.id}')">Copia progressioni</button>
        <button class="btn mini coachAction darkMini" onclick="contextualPaste('${ex.id}','${ex.day.replace(/'/g,"\\'")}')">Incolla</button>
        <button class="btn mini coachAction darkMini" onclick="rememberModalScroll();moveExerciseWithinDay('${ex.id}',-1)">Su</button>
        <button class="btn mini coachAction darkMini" onclick="rememberModalScroll();moveExerciseWithinDay('${ex.id}',1)">Giù</button>
        <button class="btn mini coachAction darkMini" onclick="rememberModalScroll();deleteExercise('${ex.id}')">Elimina</button>
      </div>
    </div>
    <div class="fieldLite"><label>Note coach</label><textarea oninput="updateExercise('${ex.id}','note',this.value)">${escapeHtml(ex.note||'')}</textarea></div>
    <div class="fieldLite"><label>Recupero</label><input value="${escapeHtml(ex.rec||'')}" oninput="updateExercise('${ex.id}','rec',this.value)"></div>
    <div class="fieldLite progressions"><label>Serie X ripetizioni</label>
      <div class="editorProgGrid">${(ex.weekPlans||[]).map((w,i)=>`<div class="progBox"><div class="wk">Settimana ${i+1}</div><div class="progFields"><input class="smallInput" value="${escapeHtml(w.sets||'')}" placeholder="Serie" inputmode="numeric" oninput="updateWeek('${ex.id}',${i},'sets',this.value.replace(/[^0-9]/g,''))"><span>x</span><input class="smallInput" value="${escapeHtml(w.reps||'')}" placeholder="Rep" inputmode="numeric" oninput="updateWeek('${ex.id}',${i},'reps',this.value.replace(/[^0-9]/g,''))"></div><div class="progPreview">${escapeHtml(buildTarget(w.sets,w.reps)||'—')}</div></div>`).join('')}</div>
    </div>
  </div>`;
}
function refreshSchedaEditor(){
  renderScheda();
  const modal=document.getElementById('schedaModal');
  if(modal && modal.classList.contains('open')) openSchedaEditor();
}
function addExercise(day){
  const targetDay=day || state.ui.selectedDay || daysList()[0];
  const newEx={id:uid(),day:targetDay,distretto:'Petto',name:'',rec:'',ordine:'',note:'',weekPlans:defaultWeekPlans()};
  state.exercises.push(newEx);
  syncDayOrder(targetDay);
  persist();
  refreshSchedaEditor();
}
function updateExercise(id,key,val){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  ex[key]=val;
  persist();
  renderScheda();
}
function updateWeek(id,idx,key,val){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  ex.weekPlans[idx]=normalizeWeekPlan(ex.weekPlans[idx]||{});
  ex.weekPlans[idx][key]=val;
  ex.weekPlans[idx]=normalizeWeekPlan(ex.weekPlans[idx]);
  persist();
  renderScheda();
}
function deleteExercise(id){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  const day=ex.day;
  state.exercises=state.exercises.filter(e=>e.id!==id);
  syncDayOrder(day);
  const ids=new Set(state.ui.selectedExerciseIds||[]);
  ids.delete(id);
  state.ui.selectedExerciseIds=[...ids];
  persist();
  refreshSchedaEditor();
}
function moveExerciseWithinDay(id,dir){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  const day=ex.day;
  const dayRows=getDayExercises(day);
  const idx=dayRows.findIndex(x=>x.id===id);
  const swapIdx=idx+dir;
  if(idx<0 || swapIdx<0 || swapIdx>=dayRows.length) return;
  const current = dayRows[idx];
  const target = dayRows[swapIdx];
  const currentOrder = current.ordine;
  current.ordine = target.ordine;
  target.ordine = currentOrder;
  syncDayOrder(day);
  persist();
  refreshSchedaEditor();
}
function copyExercise(id){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  const copy=JSON.parse(JSON.stringify(ex));
  copy.weekPlans=(copy.weekPlans||[]).map(normalizeWeekPlan);
  clipboardExercise=copy;
  alert('Blocco esercizio copiato');
}
function copyProgressions(id){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex) return;
  clipboardExercise={type:'progressions',weekPlans:JSON.parse(JSON.stringify((ex.weekPlans||[]).map(normalizeWeekPlan)))};
  alert('Progressioni copiate');
}
function pasteProgressions(id){
  const ex=state.exercises.find(e=>e.id===id);
  if(!ex || !clipboardExercise || clipboardExercise.type!=='progressions' || !clipboardExercise.weekPlans) return;
  ex.weekPlans=JSON.parse(JSON.stringify(clipboardExercise.weekPlans.map(normalizeWeekPlan)));
  persist();
  refreshSchedaEditor();
  alert('Progressioni incollate');
}
function contextualPaste(id,day){
  if(!clipboardExercise) return;
  if(clipboardExercise.type==='progressions'){ pasteProgressions(id); return; }
  rememberModalScroll();
  const dayRows=getDayExercises(day);
  const targetIndex=dayRows.findIndex(e=>e.id===id);
  if(targetIndex<0){ pasteExerciseToTop(day); return; }
  insertClipboardItems(day,targetIndex+1);
}
function rememberModalScroll(){ const card=document.querySelector('#schedaModal .modalCard'); if(card) modalScrollTop=card.scrollTop; }
function toggleExerciseSelect(id,checked){
  const set=new Set(state.ui.selectedExerciseIds||[]);
  if(checked) set.add(id); else set.delete(id);
  state.ui.selectedExerciseIds=[...set];
  persist();
}
function isExerciseSelected(id){ return (state.ui.selectedExerciseIds||[]).includes(id); }
function clearExerciseSelection(){ state.ui.selectedExerciseIds=[]; persist(); if(document.getElementById('schedaModal').classList.contains('open')) openSchedaEditor(); }
function copySelected(day){
  const ids=new Set(state.ui.selectedExerciseIds||[]);
  const list=getDayExercises(day).filter(e=>ids.has(e.id));
  if(!list.length) return alert('Seleziona almeno un esercizio');
  clipboardExercise=JSON.parse(JSON.stringify(list));
  alert('Blocchi selezionati copiati');
}
function buildClipboardCopies(day){
  if(!clipboardExercise) return [];
  const source = Array.isArray(clipboardExercise) ? clipboardExercise : [clipboardExercise];
  return source
    .filter(item=>!(item.type==='progressions'))
    .map(item=>{
      const copy=JSON.parse(JSON.stringify(item));
      copy.id=uid();
      copy.day=day;
      copy.weekPlans=(copy.weekPlans||[]).map(normalizeWeekPlan);
      return copy;
    });
}
function insertClipboardItems(day,insertIndex){
  const copies = buildClipboardCopies(day);
  if(!copies.length) return;
  const dayRows=getDayExercises(day);
  const before = dayRows.slice(0,insertIndex);
  const after = dayRows.slice(insertIndex);
  const otherRows = state.exercises.filter(e=>e.day!==day);
  state.exercises=[...otherRows,...before,...copies,...after];
  syncDayOrder(day);
  persist();
  refreshSchedaEditor();
}
function pasteExerciseToTop(day){
  if(!clipboardExercise) return;
  rememberModalScroll();
  if(clipboardExercise.type==='progressions'){
    const first=getDayExercises(day)[0];
    if(!first) return alert('Non c’è un esercizio su cui incollare le progressioni');
    pasteProgressions(first.id);
    return;
  }
  insertClipboardItems(day,0);
}
function pasteExercise(day){ pasteExerciseToTop(day); }
function deleteSelected(day){
  const ids=new Set(state.ui.selectedExerciseIds||[]);
  if(!ids.size) return alert('Seleziona almeno un esercizio');
  rememberModalScroll();
  state.exercises=state.exercises.filter(e=>!(e.day===day && ids.has(e.id)));
  state.ui.selectedExerciseIds=[];
  syncDayOrder(day);
  persist();
  refreshSchedaEditor();
}
function copyMacros(dateKey){ const d=state.diary[dateKey]||{}; macroClipboard={c:d.c||'',p:d.p||'',g:d.g||'',kcal:d.kcal||''}; alert('Macro copiate'); }
function pasteMacros(dateKey){ if(!macroClipboard) return; state.diary[dateKey]=state.diary[dateKey]||{}; Object.assign(state.diary[dateKey], macroClipboard); persist(); renderDiario(); }
function exportState(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pt-dashboard-pro-v4.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),500)}

function drawBarChart(id,obj){const cv=document.getElementById(id); if(!cv) return; const c=cv.getContext('2d'); const W=cv.clientWidth,H=cv.clientHeight; cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio; c.scale(devicePixelRatio,devicePixelRatio); c.clearRect(0,0,W,H); c.fillStyle='#fff'; c.fillRect(0,0,W,H); const entries=Object.entries(obj); if(!entries.length){c.fillStyle='#555'; c.fillText('Nessun dato',20,30); return;} const max=Math.max(...entries.map(e=>e[1]),1), left=50,bottom=36,top=20,right=10; c.strokeStyle='#d8dde4'; c.beginPath(); c.moveTo(left,top); c.lineTo(left,H-bottom); c.lineTo(W-right,H-bottom); c.stroke(); const step=(W-left-right)/entries.length, bw=Math.min(46,step*.58); entries.forEach(([lab,val],i)=>{const x=left+step*i+(step-bw)/2; const bh=(val/max)*(H-top-bottom-20); const y=H-bottom-bh; c.fillStyle='#ff7a00'; c.fillRect(x,y,bw,bh); c.fillStyle='#111'; c.font='12px Arial'; c.fillText(String(val),x,y-6); c.save(); c.translate(x+bw/2,H-8); c.rotate(-0.42); c.textAlign='right'; c.fillText(lab,0,0); c.restore();}); }
function normalize(arr){const vals=arr.map(x=>x.value).filter(v=>!isNaN(v)); if(!vals.length) return []; const min=Math.min(...vals), max=Math.max(...vals); return arr.map(x=>({...x,n:(x.value-min)/((max-min)||1)})); }
function drawMultiLineChart(id,series){const cv=document.getElementById(id); if(!cv) return; const c=cv.getContext('2d'); const W=cv.clientWidth,H=cv.clientHeight; cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio; c.scale(devicePixelRatio,devicePixelRatio); c.clearRect(0,0,W,H); c.fillStyle='#fff'; c.fillRect(0,0,W,H); const colors=['#ff7a00','#1fa85a','#3366ff','#d64545']; const norm=series.map(s=>({name:s.name,data:normalize(s.data)})).filter(s=>s.data.length); if(!norm.length){c.fillStyle='#555'; c.fillText('Nessun dato',20,30); return;} const left=48,right=18,top=22,bottom=40; c.strokeStyle='#dde2ea'; c.beginPath(); c.moveTo(left,top); c.lineTo(left,H-bottom); c.lineTo(W-right,H-bottom); c.stroke(); norm.forEach((s,idx)=>{c.strokeStyle=colors[idx%colors.length]; c.lineWidth=2.5; c.beginPath(); s.data.forEach((p,i)=>{const x=left+(i/(Math.max(s.data.length-1,1)))*(W-left-right); const y=top+(1-p.n)*(H-top-bottom); if(i===0) c.moveTo(x,y); else c.lineTo(x,y);}); c.stroke(); s.data.forEach((p,i)=>{const x=left+(i/(Math.max(s.data.length-1,1)))*(W-left-right); const y=top+(1-p.n)*(H-top-bottom); c.fillStyle=colors[idx%colors.length]; c.beginPath(); c.arc(x,y,3.5,0,Math.PI*2); c.fill();}); }); norm[0].data.forEach((p,i)=>{ if(i%Math.ceil(norm[0].data.length/6)===0 || i===norm[0].data.length-1){ const x=left+(i/(Math.max(norm[0].data.length-1,1)))*(W-left-right); c.fillStyle='#111'; c.font='11px Arial'; c.fillText(p.label||'',x-12,H-14);} }); let lx=14; series.forEach((s,idx)=>{c.fillStyle=colors[idx%colors.length]; c.fillRect(lx,12,12,12); c.fillStyle='#111'; c.font='12px Arial'; c.fillText(s.name,lx+18,22); lx += c.measureText(s.name).width + 38;}); }
window.addEventListener('resize',()=>renderRiepilogo(true));
loadState();
</script>
